                <div class="topic__header dark-grey">Тема 3</div>

                <p class="topic__text text dark-color">В Библии есть много хороших советов и обещаний. И возможно, вам любопытно с ней познакомиться. Но разумно ли верить тому, что записано в такой древней книге? Стоит ли пользоваться советами из Библии? Исполнится ли то, что она обещает? Миллионы людей в этом не сомневаются. Подумайте над следующими аргументами.</p>

                  <a class="btn-text blue-color" data-text="4231-4232">3:1, 2</a>.) Многие историки и археологи подтверждают точность дат, имён, мест и событий, упомянутых в Библии.
                </p>
              </div>

              <div class="topic__opening-first">

                  Библия во многом опередила своё время. Например, в ней упоминаются некоторые научные факты. Многие из этих фактов противоречили представлениям людей прошлого. Но современная наука подтверждает, что в Библии содержится точная информация. На Библию <span class="title">«всегда можно положиться»</span> (<a class="btn-text blue-color" data-text="191118">Псалом 111:8</a>).
                </p>
              </div>

              <div class="topic__opening-first">
                <h2 class="topic__title-small title">3. Почему библейским сообщениям о будущем можно верить?</h2>

                </p>

                  <ul class="topic__list">
                    <li class="topic__text subtitle dark-color">Что удивительного в этом простом описании круговорота воды в природе?</li>

                <ul class="topic__list mb-30">

                </p>
