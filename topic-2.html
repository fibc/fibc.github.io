                <p class="topic__text text dark-color">Сегодня жизнь людей по всему миру полна проблем, стресса, беспокойств и слёз. Возможно, в вашей жизни тоже есть что-то, что вас расстраивает. Может, вы заболели или потеряли кого-то из близких, и у вас возникает вопрос: «Жизнь когда-нибудь станет лучше?» Ответ из Библии вас приятно удивит.</p>

                </p>
